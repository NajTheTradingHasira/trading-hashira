<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Trading Hashira</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06080d;--bg1:#0b0f18;--bg2:#111827;--bg3:#1a2235;
  --border:#1e293b;--border2:#334155;
  --accent:#3b82f6;--accent2:#2563eb;
  --green:#22c55e;--red:#ef4444;--warn:#f59e0b;--gold:#eab308;
  --purple:#a78bfa;--teal:#2dd4bf;--cyan:#22d3ee;--pink:#f472b6;
  --text:#e2e8f0;--muted:#94a3b8;--dim:#64748b;--faint:#334155;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;
  --sidebar-w:220px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;display:flex;height:100vh;overflow:hidden;}
::selection{background:var(--accent);color:#fff;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar-w);background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
.sidebar-brand{padding:20px 16px 12px;border-bottom:1px solid var(--border);}
.sidebar-brand h1{font-family:var(--mono);font-size:15px;font-weight:800;letter-spacing:2px;color:var(--text);display:flex;align-items:center;gap:8px;}
.sidebar-brand h1 span{color:var(--warn);font-size:18px;}
.sidebar-brand .sub{font-size:10px;color:var(--dim);font-family:var(--mono);margin-top:4px;letter-spacing:1px;}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0;}
.nav-section{padding:12px 16px 4px;font-size:9px;font-weight:700;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;font-family:var(--mono);}
.nav-item{display:flex;align-items:center;gap:10px;padding:7px 16px;margin:1px 8px;border-radius:6px;cursor:pointer;color:var(--muted);font-size:12px;font-weight:500;transition:all .15s;}
.nav-item:hover{background:var(--bg2);color:var(--text);}
.nav-item.active{background:var(--accent);color:#fff;}
.nav-item .icon{width:18px;text-align:center;font-size:13px;flex-shrink:0;}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);font-family:var(--mono);font-size:10px;color:var(--dim);}
.sidebar-footer .status{display:flex;align-items:center;gap:6px;}
.sidebar-footer .dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── MAIN AREA ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{display:flex;align-items:center;gap:12px;padding:8px 20px;background:var(--bg1);border-bottom:1px solid var(--border);flex-shrink:0;}
.ticker-strip{flex:1;display:flex;gap:16px;overflow:hidden;font-family:var(--mono);font-size:11px;mask-image:linear-gradient(90deg,transparent,#000 30px,#000 calc(100% - 30px),transparent);}
.ts-item{display:flex;align-items:center;gap:5px;white-space:nowrap;}
.ts-sym{color:var(--dim);font-weight:700;}
.ts-price{color:var(--text);font-weight:600;}
.ts-chg{font-weight:700;font-size:10px;}
.ts-up{color:var(--green);}.ts-down{color:var(--red);}
.topbar-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.mkt-badge{padding:3px 10px;border-radius:4px;font-size:10px;font-weight:800;font-family:var(--mono);letter-spacing:.5px;}
.mkt-open{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.25);}
.mkt-closed{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.25);}
.mkt-pre{background:rgba(245,158,11,.1);color:var(--warn);border:1px solid rgba(245,158,11,.25);}
.clock{color:var(--dim);font-family:var(--mono);font-size:11px;font-weight:500;}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;padding:20px;}
.page{display:none;max-width:1400px;margin:0 auto;}
.page.active{display:block;}
.page-title{font-family:var(--mono);font-size:18px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.page-title .badge{font-size:10px;padding:3px 8px;border-radius:4px;background:var(--bg3);color:var(--dim);font-weight:600;}

/* ── CARDS / GRID ── */
.grid{display:grid;gap:12px;margin-bottom:20px;}
.grid-4{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));}
.grid-3{grid-template-columns:repeat(auto-fill,minmax(280px,1fr));}
.grid-2{grid-template-columns:1fr 1fr;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px;}
.card:hover{border-color:var(--border2);}
.card-label{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.card-value{font-family:var(--mono);font-size:26px;font-weight:800;margin-bottom:2px;}
.card-sub{font-family:var(--mono);font-size:11px;color:var(--muted);}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl thead th{padding:8px 12px;text-align:left;font-family:var(--mono);font-size:9px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:1px;background:var(--bg2);border-bottom:1px solid var(--border);white-space:nowrap;}
.tbl tbody td{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.03);white-space:nowrap;}
.tbl tbody tr:hover td{background:rgba(255,255,255,.02);}
.tbl-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:16px;}
.mono{font-family:var(--mono);}
.fw700{font-weight:700;}.fw800{font-weight:800;}
.up{color:var(--green);}.down{color:var(--red);}.flat{color:var(--muted);}
.tag{display:inline-block;padding:2px 8px;border-radius:3px;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.3px;}
.tag-s2{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2);}
.tag-s1{background:rgba(245,158,11,.1);color:var(--warn);border:1px solid rgba(245,158,11,.2);}
.tag-s3{background:rgba(245,158,11,.1);color:var(--warn);border:1px solid rgba(245,158,11,.2);}
.tag-s4{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2);}
.tag-accent{background:rgba(59,130,246,.1);color:var(--accent);border:1px solid rgba(59,130,246,.2);}

/* ── EMPTY STATE ── */
.empty{padding:40px;text-align:center;color:var(--dim);font-family:var(--mono);font-size:12px;}
.empty .icon{font-size:28px;margin-bottom:8px;}

/* ── SEARCH / INPUT ── */
.input{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px 12px;color:var(--text);font-size:12px;font-family:var(--sans);outline:none;}
.input:focus{border-color:var(--accent);}
.btn{padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:700;font-family:var(--sans);}
.btn-primary{background:var(--accent);color:#fff;}.btn-primary:hover{background:var(--accent2);}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);}.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .sidebar{width:56px;}.sidebar-brand h1 span{margin:0 auto;}.sidebar-brand .sub,.nav-section,.nav-item span:not(.icon),.sidebar-footer{display:none;}
  .nav-item{justify-content:center;padding:10px;margin:2px 4px;}.nav-item .icon{width:auto;}
  .grid-2{grid-template-columns:1fr;}.ticker-strip{display:none;}
}
</style>
</head>
<body>

<!-- ═══ SIDEBAR ═══ -->
<aside class="sidebar">
  <div class="sidebar-brand">
    <h1><span>&#9876;</span> HASHIRA</h1>
    <div class="sub">TRADING TERMINAL v4</div>
  </div>
  <nav class="sidebar-nav" id="sidebar-nav"></nav>
  <div class="sidebar-footer">
    <div class="status"><div class="dot" id="status-dot"></div><span id="status-text">Connecting...</span></div>
  </div>
</aside>

<!-- ═══ MAIN ═══ -->
<div class="main">
  <div class="topbar">
    <div class="ticker-strip" id="ticker-strip"></div>
    <div class="topbar-right">
      <div class="mkt-badge mkt-closed" id="mkt-badge">CLOSED</div>
      <div class="clock" id="clock"></div>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>

<script>
(function(){
'use strict';

// ══════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════
const API=localStorage.getItem('hashira_api')||'https://nexus-terminal-production-9d34.up.railway.app';
const INDEX_SYMS=['SPY','QQQ','IWM','DIA','VIX','CL=F','DX-Y.NYB'];
const LABEL_MAP={'CL=F':'OIL','DX-Y.NYB':'DXY'};
let prices={},curPage='dashboard';

// ══════════════════════════════════════════
// PAGES
// ══════════════════════════════════════════
const PAGES=[
  {section:'MARKETS'},
  {id:'dashboard',icon:'&#9638;',label:'Dashboard'},
  {id:'chart',icon:'&#9683;',label:'Chart'},
  {id:'watchlist',icon:'&#9733;',label:'Watchlist'},
  {id:'portfolio',icon:'&#9830;',label:'Portfolio'},
  {section:'RESEARCH'},
  {id:'deepdive',icon:'&#128269;',label:'Deep Dive'},
  {id:'canslim',icon:'&#9874;',label:'CANSLIM'},
  {id:'positionsizer',icon:'&#8982;',label:'Position Sizer'},
  {id:'screener',icon:'&#9881;',label:'Screener'},
  {id:'optionsflow',icon:'&#9883;',label:'Options Flow'},
  {id:'tradetools',icon:'&#9878;',label:'Trade Tools'},
  {section:'DATA'},
  {id:'news',icon:'&#9993;',label:'News'},
  {id:'vix',icon:'&#9889;',label:'VIX'},
  {id:'bonds',icon:'&#9648;',label:'Bonds'},
  {id:'cot',icon:'&#9635;',label:'COT'},
  {id:'sectors',icon:'&#9632;',label:'Sectors'},
  {id:'earnings',icon:'&#9670;',label:'Earnings'},
  {section:'QUANTITATIVE'},
  {id:'stageanalysis',icon:'&#9650;',label:'Stage Analysis'},
  {id:'breadth',icon:'&#9644;',label:'Breadth'},
  {id:'hmmregime',icon:'&#9673;',label:'HMM Regime'},
  {id:'darkpool',icon:'&#9679;',label:'Dark Pool'},
  {id:'backtester',icon:'&#8634;',label:'Backtester'},
  {section:''},
  {id:'settings',icon:'&#9881;',label:'Settings'},
];

// ══════════════════════════════════════════
// SIDEBAR
// ══════════════════════════════════════════
function buildSidebar(){
  const nav=document.getElementById('sidebar-nav');
  let html='';
  PAGES.forEach(p=>{
    if(p.section!==undefined){
      if(p.section)html+=`<div class="nav-section">${p.section}</div>`;
      return;
    }
    html+=`<div class="nav-item${p.id==='dashboard'?' active':''}" data-page="${p.id}" onclick="H.go('${p.id}')">
      <span class="icon">${p.icon}</span><span>${p.label}</span>
    </div>`;
  });
  nav.innerHTML=html;
}

// ══════════════════════════════════════════
// ROUTING
// ══════════════════════════════════════════
function go(id){
  curPage=id;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.page===id));
  renderPage(id);
}

// ══════════════════════════════════════════
// API
// ══════════════════════════════════════════
async function apiFetch(path){
  try{
    const r=await fetch(API+path);
    if(!r.ok)throw new Error('HTTP '+r.status);
    return await r.json();
  }catch(e){console.warn('[API]',path,e.message);return null;}
}

async function fetchPrices(){
  const syms=INDEX_SYMS.map(s=>s==='VIX'?'^VIX':s).join(',');
  const d=await apiFetch('/api/prices?symbols='+encodeURIComponent(syms));
  if(!d||!d.prices)return;
  Object.entries(d.prices).forEach(([k,v])=>{
    prices[k==='^VIX'?'VIX':k]=v;
  });
  renderTickerStrip();
  if(curPage==='dashboard')renderPage('dashboard');
  document.getElementById('status-text').textContent='Connected';
  document.getElementById('status-dot').style.background='var(--green)';
}

// ══════════════════════════════════════════
// TICKER STRIP
// ══════════════════════════════════════════
function renderTickerStrip(){
  const el=document.getElementById('ticker-strip');
  el.innerHTML=INDEX_SYMS.map(sym=>{
    const d=prices[sym]||{};
    const p=d.price?parseFloat(d.price):0;
    const c=d.dayPct?parseFloat(d.dayPct):0;
    const cls=c>=0?'ts-up':'ts-down';
    const lbl=LABEL_MAP[sym]||sym;
    return`<div class="ts-item"><span class="ts-sym">${lbl}</span><span class="ts-price">${p?p.toFixed(2):'--'}</span><span class="ts-chg ${cls}">${p?(c>=0?'+':'')+c.toFixed(2)+'%':''}</span></div>`;
  }).join('');
}

// ══════════════════════════════════════════
// CLOCK / MARKET STATUS
// ══════════════════════════════════════════
function updateClock(){
  const est=new Date(new Date().toLocaleString('en-US',{timeZone:'America/New_York'}));
  const h=est.getHours(),m=est.getMinutes(),s=est.getSeconds();
  document.getElementById('clock').textContent=
    String(h%12||12).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+' '+(h>=12?'PM':'AM')+' ET';
  const day=est.getDay(),min=h*60+m,el=document.getElementById('mkt-badge');
  if(day===0||day===6||min>=960){el.textContent='CLOSED';el.className='mkt-badge mkt-closed';}
  else if(min>=570&&min<960){el.textContent='OPEN';el.className='mkt-badge mkt-open';}
  else if(min>=240&&min<570){el.textContent='PRE-MKT';el.className='mkt-badge mkt-pre';}
  else{el.textContent='CLOSED';el.className='mkt-badge mkt-closed';}
}

// ══════════════════════════════════════════
// PAGE RENDERERS
// ══════════════════════════════════════════
function fp(v){if(v==null||isNaN(v))return'--';return(v>=0?'+':'')+parseFloat(v).toFixed(2)+'%';}
function fpc(v){if(v==null||isNaN(v))return'flat';return v>=0?'up':'down';}

function renderPage(id){
  const c=document.getElementById('content');
  const fn=PAGE_RENDERERS[id];
  if(fn){c.innerHTML=`<div class="page active" id="pg-${id}">${fn()}</div>`;}
  else{c.innerHTML=`<div class="page active"><div class="page-title">${id.replace(/([A-Z])/g,' $1').replace(/^./,s=>s.toUpperCase())}</div><div class="empty"><div class="icon">&#128736;</div>Coming soon</div></div>`;}
}

const PAGE_RENDERERS={

dashboard(){
  const idx=INDEX_SYMS.map(sym=>{
    const d=prices[sym]||{};const p=parseFloat(d.price)||0;const c=parseFloat(d.dayPct)||0;
    const lbl=LABEL_MAP[sym]||sym;
    return`<div class="card"><div class="card-label">${lbl}</div><div class="card-value" style="font-size:22px">${p?'$'+p.toFixed(2):'--'}</div><div class="card-sub ${fpc(c)}">${fp(c)}</div></div>`;
  }).join('');
  return`
    <div class="page-title">&#9638; Dashboard <span class="badge">LIVE</span></div>
    <div class="grid grid-4">${idx}</div>
    <div class="grid grid-2">
      <div class="card"><div class="card-label">MARKET REGIME</div><div class="card-value" style="font-size:18px;color:var(--warn)" id="dash-regime">Loading...</div><div class="card-sub">Weinstein stage analysis</div></div>
      <div class="card"><div class="card-label">FEAR & GREED</div><div class="card-value" style="font-size:18px;color:${(parseFloat(prices.VIX?.price)||20)>25?'var(--red)':'var(--green)'}">${prices.VIX?.price?'VIX '+parseFloat(prices.VIX.price).toFixed(2):'--'}</div><div class="card-sub">${(parseFloat(prices.VIX?.price)||20)<15?'Low Vol':(parseFloat(prices.VIX?.price)||20)<20?'Normal':(parseFloat(prices.VIX?.price)||20)<30?'Elevated':'High Fear'}</div></div>
    </div>`;
},

watchlist(){
  return`
    <div class="page-title">&#9733; Watchlist</div>
    <div class="toolbar">
      <input class="input" id="wl-search" placeholder="Search ticker..." style="width:200px">
      <button class="btn btn-primary" onclick="H.wlRefresh()">Refresh</button>
      <button class="btn btn-ghost" onclick="H.wlAdd()">+ Add Ticker</button>
    </div>
    <div class="tbl-wrap"><table class="tbl"><thead><tr><th>Ticker</th><th>Price</th><th>Day %</th><th>Week %</th><th>Month %</th><th>Stage</th><th>RS</th></tr></thead><tbody id="wl-body"><tr><td colspan="7" class="empty">Loading watchlist...</td></tr></tbody></table></div>`;
},

chart(){
  return`
    <div class="page-title">&#9683; Chart</div>
    <div class="toolbar">
      <input class="input" id="chart-sym" placeholder="AAPL" style="width:100px;text-transform:uppercase">
      <button class="btn btn-primary" onclick="H.loadChart()">Load</button>
      <button class="btn btn-ghost">1D</button><button class="btn btn-ghost">1W</button><button class="btn btn-ghost">1M</button><button class="btn btn-ghost">3M</button><button class="btn btn-ghost">1Y</button>
    </div>
    <div class="card" style="height:500px;display:flex;align-items:center;justify-content:center;color:var(--dim)"><div class="empty"><div class="icon">&#9683;</div>Enter a ticker above to load chart</div></div>`;
},

portfolio(){
  return`
    <div class="page-title">&#9830; Portfolio</div>
    <div class="toolbar"><button class="btn btn-primary">+ New Position</button><button class="btn btn-ghost">Import CSV</button></div>
    <div class="grid grid-4">
      <div class="card"><div class="card-label">TOTAL VALUE</div><div class="card-value" style="font-size:22px">--</div></div>
      <div class="card"><div class="card-label">DAY P&L</div><div class="card-value" style="font-size:22px">--</div></div>
      <div class="card"><div class="card-label">OPEN POSITIONS</div><div class="card-value" style="font-size:22px">0</div></div>
      <div class="card"><div class="card-label">WIN RATE</div><div class="card-value" style="font-size:22px">--</div></div>
    </div>
    <div class="tbl-wrap"><table class="tbl"><thead><tr><th>Ticker</th><th>Side</th><th>Qty</th><th>Entry</th><th>Current</th><th>P&L</th><th>P&L %</th></tr></thead><tbody><tr><td colspan="7" class="empty">No positions yet</td></tr></tbody></table></div>`;
},

deepdive(){
  return`
    <div class="page-title">&#128269; Deep Dive</div>
    <div class="toolbar"><input class="input" id="dd-sym" placeholder="AAPL" style="width:100px;text-transform:uppercase"><button class="btn btn-primary" onclick="H.deepDive()">Analyze</button></div>
    <div id="dd-output" class="card"><div class="empty"><div class="icon">&#128269;</div>Enter a ticker for AI-powered deep dive analysis</div></div>`;
},

canslim(){
  return`
    <div class="page-title">&#9874; CANSLIM Screen</div>
    <div class="toolbar"><button class="btn btn-primary" onclick="H.runScreen('canslim')">Run Screen</button><button class="btn btn-ghost" onclick="H.runScreen('stage2')">Stage 2</button><button class="btn btn-ghost" onclick="H.runScreen('highrs')">High RS</button></div>
    <div class="tbl-wrap"><table class="tbl"><thead><tr><th>Ticker</th><th>Company</th><th>Price</th><th>Change</th><th>Stage</th><th>RS</th><th>EPS Q/Q</th><th>Sales Q/Q</th></tr></thead><tbody id="canslim-body"><tr><td colspan="8" class="empty">Click Run Screen to fetch results</td></tr></tbody></table></div>`;
},

positionsizer(){
  return`
    <div class="page-title">&#8982; Position Sizer</div>
    <div class="grid grid-2">
      <div class="card">
        <div class="card-label">CALCULATOR</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px">
          <div><label style="font-size:10px;color:var(--dim);display:block;margin-bottom:4px">Account Size</label><input class="input" id="ps-acct" value="100000" style="width:100%"></div>
          <div><label style="font-size:10px;color:var(--dim);display:block;margin-bottom:4px">Risk %</label><input class="input" id="ps-risk" value="1" style="width:100%"></div>
          <div><label style="font-size:10px;color:var(--dim);display:block;margin-bottom:4px">Entry Price</label><input class="input" id="ps-entry" placeholder="0.00" style="width:100%"></div>
          <div><label style="font-size:10px;color:var(--dim);display:block;margin-bottom:4px">Stop Loss</label><input class="input" id="ps-stop" placeholder="0.00" style="width:100%"></div>
        </div>
        <button class="btn btn-primary" style="margin-top:12px;width:100%" onclick="H.calcPosition()">Calculate</button>
      </div>
      <div class="card" id="ps-result">
        <div class="card-label">RESULT</div>
        <div class="empty">Enter values and calculate</div>
      </div>
    </div>`;
},

screener(){
  return`
    <div class="page-title">&#9881; Screener</div>
    <div class="toolbar">
      <select class="input" id="scr-preset"><option value="stage2">Stage 2 Breakouts</option><option value="stage4">Stage 4 Breakdowns</option><option value="canslim">CANSLIM</option><option value="highrs">High RS Leaders</option><option value="pullback">Stage 2 Pullbacks</option><option value="breakout">52W High Breakouts</option></select>

function calcPosition(){
  const acct=parseFloat(document.getElementById('ps-acct').value)||0;
  const risk=parseFloat(document.getElementById('ps-risk').value)||0;
  const entry=parseFloat(document.getElementById('ps-entry').value)||0;
  const stop=parseFloat(document.getElementById('ps-stop').value)||0;
  if(!entry||!stop||entry===stop){document.getElementById('ps-result').innerHTML='<div class="card-label">RESULT</div><div style="color:var(--red);font-size:12px">Enter valid entry and stop</div>';return;}
  const riskAmt=acct*(risk/100);
  const perShare=Math.abs(entry-stop);
  const shares=Math.floor(riskAmt/perShare);
  const posSize=shares*entry;
  document.getElementById('ps-result').innerHTML=`
    <div class="card-label">RESULT</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px;font-family:var(--mono)">
      <div><div style="font-size:10px;color:var(--dim)">SHARES</div><div style="font-size:24px;font-weight:800;color:var(--accent)">${shares}</div></div>
      <div><div style="font-size:10px;color:var(--dim)">POSITION SIZE</div><div style="font-size:24px;font-weight:800">$${posSize.toLocaleString()}</div></div>
      <div><div style="font-size:10px;color:var(--dim)">RISK AMOUNT</div><div style="font-size:16px;font-weight:700;color:var(--red)">$${riskAmt.toFixed(0)}</div></div>
      <div><div style="font-size:10px;color:var(--dim)">RISK PER SHARE</div><div style="font-size:16px;font-weight:700">$${perShare.toFixed(2)}</div></div>
      <div><div style="font-size:10px;color:var(--dim)">% OF ACCOUNT</div><div style="font-size:16px;font-weight:700">${(posSize/acct*100).toFixed(1)}%</div></div>
      <div><div style="font-size:10px;color:var(--dim)">R:R AT 2R</div><div style="font-size:16px;font-weight:700;color:var(--green)">$${(riskAmt*2).toFixed(0)}</div></div>
    </div>`;
}

async function runScreen(preset){
  const body=document.getElementById('scr-body')||document.getElementById('canslim-body');
  if(!body)return;
  body.innerHTML='<tr><td colspan="8" class="empty">Loading...</td></tr>';
  const d=await apiFetch('/api/finviz/screener?preset='+preset+'&limit=50');
  if(!d||!d.results||!d.results.length){body.innerHTML='<tr><td colspan="8" class="empty">No results</td></tr>';return;}
  body.innerHTML=d.results.map(r=>`<tr>
    <td class="mono fw800">${r.ticker}</td>
    <td>${r.company||''}</td>
    <td class="mono">$${r.price?.toFixed(2)||'--'}</td>
    <td class="mono ${(r.change_pct||0)>=0?'up':'down'}">${r.change_pct!=null?(r.change_pct>=0?'+':'')+r.change_pct.toFixed(2)+'%':'--'}</td>
    <td><span class="tag tag-${r.stage?.toLowerCase().replace(' ','')?.startsWith('stage 2')?'s2':r.stage?.toLowerCase().includes('4')?'s4':'s1'}">${r.stage||'--'}</span></td>
    <td class="mono fw700">${r.rs_rating||'--'}</td>
    <td class="mono">${r.eps_qoq!=null?r.eps_qoq+'%':'--'}</td>
    <td class="mono">${r.sales_qoq!=null?r.sales_qoq+'%':'--'}</td>
  </tr>`).join('');
}

async function runHMM(){
  const sym=(document.getElementById('hmm-sym').value||'SPY').toUpperCase();
  const out=document.getElementById('hmm-output');
  out.innerHTML='<div class="empty">Running HMM model for '+sym+'...</div>';
  const d=await apiFetch('/api/signal/'+sym);
  if(!d){out.innerHTML='<div class="empty" style="color:var(--red)">Failed to reach backend</div>';return;}
  const score=(d.composite_score*100).toFixed(1);
  const regime=d.composite_score>=0.55?'Bull':d.composite_score<=0.25?'Bear':'Ranging';
  const color=regime==='Bull'?'var(--green)':regime==='Bear'?'var(--red)':'var(--warn)';
  out.innerHTML=`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
      <span style="color:${color};font-size:18px;font-weight:800;font-family:var(--mono)">${sym} - ${regime}</span>
      <span class="tag" style="background:${color}22;color:${color};border:1px solid ${color}44">${d.signal||'HOLD'}</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;font-family:var(--mono);font-size:12px">
      <div><div style="color:var(--dim);font-size:10px">COMPOSITE</div><div style="font-weight:700;color:${color}">${score}%</div></div>
      <div><div style="color:var(--dim);font-size:10px">MOMENTUM</div><div style="font-weight:700">${(d.momentum_score*100).toFixed(1)}%</div></div>
      <div><div style="color:var(--dim);font-size:10px">RL CONFIDENCE</div><div style="font-weight:700">${(d.rl_confidence*100).toFixed(1)}%</div></div>
      <div><div style="color:var(--dim);font-size:10px">MEAN REV Z</div><div style="font-weight:700">${d.mean_reversion?.z_score?.toFixed(2)||'--'}</div></div>
      <div><div style="color:var(--dim);font-size:10px">SENTIMENT</div><div style="font-weight:700">${d.sentiment?.toFixed(3)||'--'}</div></div>
      <div><div style="color:var(--dim);font-size:10px">SIGNAL</div><div style="font-weight:700;color:${color}">${d.signal||'--'}</div></div>
    </div>`;
}

function saveAPI(){
  const v=document.getElementById('set-api').value.trim();
  if(v){localStorage.setItem('hashira_api',v);location.reload();}
}
function savePolygon(){
  const v=document.getElementById('set-polygon').value.trim();
  if(v){localStorage.setItem('polygon_key',v);}
}
